version: 2

updates:

  - package-ecosystem: "nuget"

    directory: "/"
    schedule:
      interval: "weekly" # "daily", "weekly" or "monthly".
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
      
    open-pull-requests-limit: 10
    
    groups:
      nuget-minor-and-patch:
        update-types: ["minor", "patch"]


  - package-ecosystem: "github-actions"

    # "/" => .github/workflows/ 
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Berlin"